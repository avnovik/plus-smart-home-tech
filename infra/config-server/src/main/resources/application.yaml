spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations:
            - classpath:/config/telemetry/{application}
            - classpath:/config/commerce/{application}
server:
  port: 0

# Spring Boot Actuator: endpoint /actuator/health.
management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/